# ============================================================
# BART Ridership Project - Central Configuration
# Tum path ve parametreler buradan okunur (no hardcoding).
# Yerel (local) ve Kaggle ortamlari icin path setleri ayrilmistir.
# ============================================================

# Aktif ortam (environment): "local" veya "kaggle"
# Kaggle'a tasirken sadece burayi "kaggle" yapman yeterli.
environment: local

paths:
  local:
    raw_dir: "data/raw"
    sample_dir: "data/sample"
    processed_dir: "data/processed"
    models_dir: "models"
    figures_dir: "reports/figures"
  kaggle:
    raw_dir: "/kaggle/input/bart-ridership"
    sample_dir: "data/sample"
    processed_dir: "data/processed"
    models_dir: "/kaggle/working/models"
    figures_dir: "/kaggle/working/figures"

# Ham veri dosya adlari (file names) - her iki ortamda da ayni
files:
  ridership_2016: "date-hour-soo-dest-2016.csv"
  ridership_2017: "date-hour-soo-dest-2017.csv"
  stations: "station_info.csv"
  sample: "bart_sample.csv"           # gercek veriden turetilmis ornek
  final_model: "bart_lgb_final.txt"

# Eksik istasyon (WSPR) - referans butunlugu icin manuel eklenir
# (Analiz 2.1: missing_origin tespiti)
manual_stations:
  - abbreviation: "WSPR"
    description: "Warm Springs / South Fremont"
    location: "-121.939317,37.502171"   # "lon,lat" formatinda (orijinal sema)
    name: "Warm Springs / South Fremont"

# Veri kaynagi: True ise data/sample (yerel test), False ise tam ham veri (Kaggle egitim)
use_sample: true

# Ornekleme (sampling) - gercek veriden zaman-bilincli alt kume
sampling:
  strategy: "by_station"     # "by_station" (tam zaman cizgisi korunur) | "by_daterange"
  n_stations: 12             # by_station: kac istasyon tutulacak (en busy + zorunlu edge-case)
  must_include: ["WSPR"]     # edge-case istasyonlar her zaman dahil
  random_state: 42

# Hedef ve zaman ayarlari
target: "Throughput"
datetime_col: "DateTime"
temporal_split:
  train_year: 2016
  test_year: 2017

# Feature engineering ayarlari
features:
  holiday_subdiv: "CA"          # California tatilleri
  # Self-trip (Origin==Destination) politikasi: "drop" | "flag" | "keep"
  # Analiz 3.5: dist_km=0 olan ayni-istasyon kayitlari (muhtemelen turnike artefakti)
  self_trip_policy: "drop"
  # Lag/rolling (zaman-sirali, leakage-safe). Her OD cifti icinde "onceki kayit".
  lags: [1, 24]                 # 1 = bir onceki gozlem, 24 ~ bir onceki gunun ayni saati
  rolling_window: 3             # son N gozlemin ortalamasi (shift'li, gelecek sizmaz)
  # LightGBM'e dogrudan category dtype verilecek kolonlar (cat.codes ordinal fix, analiz 3.3)
  categorical: ["Origin", "Destination", "DayOfWeek", "Period"]
  # Modele girecek sayisal kolonlar (lag kolonlari runtime'da eklenir)
  numeric: ["Hour", "Month", "dist_km", "IsWeekend", "IsHoliday"]

# EDA (exploratory analysis / kesifsel analiz) ayarlari
# Orijinal notebook'taki 6 is sorusu icin parametreler (hardcoding yok).
eda:
  top_n: 10                       # bar grafiklerde gosterilecek satir sayisi
  evening_period: "Evening"       # "ise donus" koltuk analizi icin period etiketi
  late_night_period: "LateNight"  # gece yolcusu sorusu icin period etiketi
  # Berkeley -> SF "koltuk bulma" sorusu: cografi bounding-box (spatial filter),
  # manuel istasyon secmeden lat/lon ile filtreler (orijinal cell-66/67 mantigi).
  berkeley_box:
    lat: [37.85, 37.89]
    lon: [-122.28, -122.25]
  sf_box:
    lat: [37.70, 37.81]
    lon: [-122.52, -122.36]

# Model (LightGBM) ayarlari
model:
  device: "cpu"               # local: cpu | kaggle: gpu (notebook'ta override edilir)
  num_boost_round: 2000
  early_stopping_rounds: 50
  log_period: 100             # 0 = sessiz
  run_cv: true                # TimeSeriesSplit CV calistir
  cv_splits: 3
  params:
    objective: "regression"
    metric: "mae"
    boosting_type: "gbdt"
    num_leaves: 256
    learning_rate: 0.05
    feature_fraction: 0.8
    bagging_fraction: 0.8
    bagging_freq: 5
    n_jobs: -1
    verbose: -1
    random_state: 42

# Reproducibility
random_state: 42
